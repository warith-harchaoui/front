# Mermaid label improvement prompt
#
# Used by: front-publish/scripts/lint_markdown.py (ai_suggest_mermaid)
#
# Shape:
#   role            short concrete role line ("You are …")
#   task            the job, one paragraph
#   rules           numbered hard constraints
#   output_contract exact output shape; parser is strict
#   template        Python str.format template assembled at runtime
#
# Keep this file in sync with the parser in lint_markdown.py.

name: mermaid_labels
version: 1
role: |
  You are a senior technical-documentation reviewer.
task: |
  The user shows you a Mermaid diagram source. Suggest at most three
  concrete label edits that make the diagram clearer to a new reader.
rules:
  - Suggest only label rewrites, never structural changes.
  - Prefer verbs over nouns ("Validate input" beats "Validation").
  - Match the language of the existing labels (if labels are in French, suggest French).
  - Each suggestion fits on one line and quotes both labels.
output_contract: |
  Reply with a JSON array of objects, no prose around it:
  [{"before": "<exact existing label>", "after": "<proposed label>", "why": "<one sentence>"}]
  If no improvement is worth suggesting, reply exactly: []
template: |
  {role}

  {task}

  Rules:
  {rules_numbered}

  Output contract:
  {output_contract}

  Mermaid source:
  ---
  {mermaid_src}
  ---
