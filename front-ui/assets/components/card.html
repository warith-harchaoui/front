<!-- Cards — vanilla HTML + Tailwind. -->

<!-- Plain card -->
<article class="rounded-2xl bg-surface-secondary p-5 dark:bg-surface-secondary-dark">
  <h3 class="text-[17px] font-semibold text-label-primary dark:text-label-primary-dark">Account</h3>
  <p class="mt-1 text-[15px] text-label-secondary dark:text-label-secondary-dark">Update your profile, password, and notification preferences.</p>
</article>

<!-- Card with leading icon -->
<article class="rounded-2xl bg-surface-secondary p-5 dark:bg-surface-secondary-dark">
  <div class="grid h-10 w-10 place-items-center rounded-xl bg-brand-blue/15 text-brand-blue">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M12 2v20M2 12h20"/>
    </svg>
  </div>
  <h3 class="mt-3 text-[17px] font-semibold text-label-primary dark:text-label-primary-dark">Create something</h3>
  <p class="mt-1 text-[15px] text-label-secondary dark:text-label-secondary-dark">Start a project from a blank canvas or a template.</p>
</article>

<!-- Linked card (whole card clickable) -->
<a href="/projects/42"
   class="block rounded-2xl bg-surface-secondary p-5 transition-transform duration-150
          hover:bg-surface-tertiary focus-visible:scale-[0.99]
          dark:bg-surface-secondary-dark dark:hover:bg-surface-tertiary-dark
          motion-reduce:focus-visible:scale-100">
  <div class="flex items-start justify-between gap-3">
    <div>
      <h3 class="text-[17px] font-semibold text-label-primary dark:text-label-primary-dark">Acme dashboard</h3>
      <p class="mt-1 text-[15px] text-label-secondary dark:text-label-secondary-dark">Updated 2 hours ago · 4 collaborators</p>
    </div>
    <svg class="rtl:rotate-180 mt-1 h-5 w-5 text-label-tertiary dark:text-label-tertiary-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </div>
</a>

<!-- Stat card -->
<article class="rounded-2xl bg-surface-secondary p-5 dark:bg-surface-secondary-dark">
  <p class="text-[13px] font-medium uppercase tracking-wider text-label-tertiary dark:text-label-tertiary-dark">Active users</p>
  <p class="mt-1 text-4xl font-bold tracking-tight tabular-nums">12,438</p>
  <p class="mt-1 text-[13px] text-brand-green">+8.4% this week</p>
</article>
