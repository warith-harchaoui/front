<!-- Buttons — vanilla HTML + Tailwind. Copy any single block. -->

<!-- Primary -->
<button class="inline-flex min-h-11 items-center justify-center gap-2 rounded-full
               bg-brand-blue px-5 py-3 text-[17px] font-semibold text-white
               transition-transform duration-100 ease-out
               hover:opacity-90 active:scale-[0.97]
               focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-blue
               focus-visible:ring-offset-2 focus-visible:ring-offset-surface-primary
               dark:focus-visible:ring-offset-surface-primary-dark
               motion-reduce:active:scale-100
               disabled:opacity-50 disabled:pointer-events-none">
  Get started
</button>

<!-- Secondary -->
<button class="inline-flex min-h-11 items-center justify-center rounded-full
               bg-surface-secondary px-5 py-3 text-[17px] font-medium text-label-primary
               hover:bg-surface-tertiary active:scale-[0.97] motion-reduce:active:scale-100
               dark:bg-surface-secondary-dark dark:text-label-primary-dark dark:hover:bg-surface-tertiary-dark">
  Learn more
</button>

<!-- Tertiary (text only) -->
<button class="inline-flex min-h-11 items-center justify-center px-3 text-[17px] font-medium text-brand-blue hover:underline">
  Cancel
</button>

<!-- Destructive -->
<button class="inline-flex min-h-11 items-center justify-center rounded-full
               bg-brand-red px-5 py-3 text-[17px] font-semibold text-white
               hover:opacity-90 active:scale-[0.97] motion-reduce:active:scale-100">
  Delete project
</button>

<!-- Icon-only (must have aria-label) -->
<button aria-label="Close"
        class="grid h-11 w-11 place-items-center rounded-full text-label-primary
               hover:bg-surface-secondary dark:text-label-primary-dark dark:hover:bg-surface-secondary-dark">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M6 6l12 12M18 6L6 18"/>
  </svg>
</button>

<!-- Loading -->
<button disabled
        class="inline-flex min-h-11 items-center justify-center gap-2 rounded-full bg-brand-blue px-5 py-3 text-[17px] font-semibold text-white opacity-90">
  <svg class="h-5 w-5 animate-spin motion-reduce:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path d="M21 12a9 9 0 11-6.219-8.56"/>
  </svg>
  <span>Working…</span>
</button>
