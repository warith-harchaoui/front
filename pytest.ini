[pytest]
# Test discovery and runtime config for the front skill.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# ``-m "not eval"`` excludes the deepeval suite from the default run; opt
# in explicitly with ``pytest -m eval``.
addopts = -ra -q --strict-markers -m "not eval"
markers =
    network: marks tests that require network access (deselect with '-m "not network"')
    slow: marks tests that take noticeable time to run
    eval: LLM-output quality tests under tests/eval/ (need Ollama running)
