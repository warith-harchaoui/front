# mypy.ini — type gate for the front-* skill scripts (CODING_ALL.md rule 3,
# type half). Run via scripts/run_mypy.sh, which checks each skill's scripts/
# dir in isolation. This is the AUDIT counterpart to ruff (lint) — see ruff.toml.
#
# ignore_missing_imports: the local-AI scripts lazily import heavy optional
# backends (torch / nemo / dowhy / shap / ollama / sklearn) that are NOT in the
# light CI lane. We type-check the code's OWN annotations, not third-party stubs.
# This is a pragmatic gate, not `--strict`; tighten per-module over time.

[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_redundant_casts = True
# Every def carries a full signature — no untyped or partially-typed functions.
# (warn_return_any / disallow_any_generics stay OFF: they fight the untyped
# optional-backend boundary; tighten those per-module over time instead.)
disallow_untyped_defs = True
disallow_incomplete_defs = True
# NOTE: warn_unused_ignores is intentionally OFF. With ignore_missing_imports,
# whether a `# type: ignore` on an optional-backend import is "used" depends on
# whether that heavy dep happens to be installed — so the flag produces false
# positives in the light CI lane. The ignores are kept for the dev environment
# where the backends ARE present.
# Scripts add their own dir to sys.path at runtime and import siblings by bare
# name (`from _click import ...`); run_mypy.sh checks one scripts/ dir at a time
# so those resolve and the shared helper names (_click, _argparse, _lang,
# _vocab, _colors, _style) don't collide across skills in a single run.
