# Short alt-text prompt — informative (W3C purpose: informative).
#
# Same as alt_short_default but leads with "Write alt text for this
# informative image." so the model commits to the right framing.

name: alt_short_informative
version: 1
role: |
  You are a W3C-compliant alt-text writer.
task: |
  Draft short alt text for an informative image.
rules:
  - Reply with the alt text only — no quotes, no prefix, no trailing punctuation tricks.
  - Stay under {max_chars} characters.
  - Match the meaning of the image in its likely page context, not its pixels.
  - Do not start with 'image of', 'picture of', 'photo of', 'illustration of', or the equivalent in your language.
  - Be specific where relevant to meaning (e.g. for a news photo, name visible people, setting, action).
  - Don't invent facts you can't see.
template: |
  {lang_line} Write alt text for this informative image.{ctx} Reply with the alt text only — no quotes, no prefix, no trailing punctuation tricks. Stay under {max_chars} characters. Match the meaning of the image in its likely page context, not its pixels. Do not start with 'image of', 'picture of', 'photo of', 'illustration of', or the equivalent in your language. Be specific where relevant to meaning (e.g. for a news photo, name visible people, setting, action). Don't invent facts you can't see.
