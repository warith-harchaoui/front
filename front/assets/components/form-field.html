<!-- Form fields — semantic, accessible, themed. -->

<!-- Text input -->
<label class="block">
  <span class="block text-[15px] font-medium text-label-primary dark:text-label-primary-dark">Email</span>
  <input type="email" name="email" autocomplete="email" required dir="auto"
         class="mt-1 block w-full rounded-xl border border-separator bg-surface-secondary
                px-3 py-2.5 text-[17px] text-label-primary placeholder:text-label-tertiary
                focus:border-brand-blue focus:outline-none focus:ring-2 focus:ring-brand-blue/30
                dark:bg-surface-secondary-dark dark:text-label-primary-dark
                dark:placeholder:text-label-tertiary-dark"
         placeholder="you@example.com">
</label>

<!-- Input with error -->
<label class="mt-3 block">
  <span class="block text-[15px] font-medium text-label-primary dark:text-label-primary-dark">Password</span>
  <input type="password" name="password" autocomplete="current-password" required
         aria-invalid="true" aria-describedby="pw-err"
         class="mt-1 block w-full rounded-xl border border-brand-red bg-surface-secondary
                px-3 py-2.5 text-[17px] focus:outline-none focus:ring-2 focus:ring-brand-red/30
                dark:bg-surface-secondary-dark">
  <p id="pw-err" class="mt-1 text-[13px] text-brand-red" role="alert">
    Must be at least 8 characters.
  </p>
</label>

<!-- Textarea -->
<label class="mt-3 block">
  <span class="block text-[15px] font-medium">Message</span>
  <textarea name="message" rows="4" dir="auto"
            class="mt-1 block w-full resize-y rounded-xl border border-separator bg-surface-secondary px-3 py-2.5 text-[17px]
                   focus:border-brand-blue focus:outline-none focus:ring-2 focus:ring-brand-blue/30
                   dark:bg-surface-secondary-dark"></textarea>
</label>

<!-- Select -->
<label class="mt-3 block">
  <span class="block text-[15px] font-medium">Country</span>
  <select name="country" autocomplete="country-name"
          class="mt-1 block w-full rounded-xl border border-separator bg-surface-secondary px-3 py-2.5 text-[17px]
                 focus:border-brand-blue focus:outline-none focus:ring-2 focus:ring-brand-blue/30
                 dark:bg-surface-secondary-dark">
    <option>France</option>
    <option>United Kingdom</option>
    <option>United States</option>
  </select>
</label>

<!-- Toggle (switch) -->
<label class="mt-3 flex items-center justify-between gap-3">
  <span class="text-[17px]">Email me about new releases</span>
  <input type="checkbox" role="switch" checked
         class="peer sr-only">
  <span aria-hidden="true"
        class="relative inline-block h-7 w-12 flex-none rounded-full bg-label-tertiary/40
               transition-colors peer-checked:bg-brand-green
               peer-focus-visible:ring-2 peer-focus-visible:ring-brand-blue peer-focus-visible:ring-offset-2
               dark:peer-focus-visible:ring-offset-surface-primary-dark">
    <span class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-white shadow transition-transform peer-checked:translate-x-5 motion-reduce:transition-none"></span>
  </span>
</label>

<!-- Helper text -->
<p class="mt-1 text-[13px] text-label-secondary dark:text-label-secondary-dark">
  We'll send no more than one email per month.
</p>
