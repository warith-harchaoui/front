<!-- Modal — native <dialog>, vanilla JS. -->

<button id="open" class="rounded-full bg-brand-blue px-4 py-2 font-semibold text-white">
  Open modal
</button>

<dialog id="confirm"
        class="m-auto w-full max-w-sm rounded-2xl bg-surface-primary p-5
               backdrop:bg-black/40 dark:bg-surface-primary-dark">
  <h2 class="text-[17px] font-semibold text-label-primary dark:text-label-primary-dark">
    Delete this draft?
  </h2>
  <p class="mt-1 text-[15px] text-label-secondary dark:text-label-secondary-dark">
    This can't be undone.
  </p>

  <div class="mt-5 flex gap-2">
    <button value="cancel"
            class="flex-1 min-h-11 rounded-xl bg-surface-secondary px-4 font-medium text-label-primary
                   dark:bg-surface-secondary-dark dark:text-label-primary-dark">
      Cancel
    </button>
    <button value="delete"
            class="flex-1 min-h-11 rounded-xl bg-brand-red px-4 font-semibold text-white">
      Delete
    </button>
  </div>
</dialog>

<script type="module">
  const dlg = document.getElementById('confirm');
  document.getElementById('open').addEventListener('click', () => dlg.showModal());

  // Click-outside closes
  dlg.addEventListener('click', (e) => { if (e.target === dlg) dlg.close('cancel'); });

  // Read the result
  dlg.addEventListener('close', () => {
    if (dlg.returnValue === 'delete') {
      // perform the destructive action
    }
  });
</script>

<!-- Bottom sheet variant (mobile-feeling) -->
<dialog id="sheet"
        class="m-0 mt-auto w-full max-w-none translate-y-full rounded-t-2xl bg-surface-primary p-5
               backdrop:bg-black/40 transition-transform duration-300 ease-native
               open:translate-y-0 motion-reduce:transition-none
               sm:m-auto sm:max-w-md sm:translate-y-0 sm:rounded-2xl
               dark:bg-surface-primary-dark">
  <div class="mx-auto mb-3 h-1 w-12 rounded-full bg-label-tertiary/40 sm:hidden" aria-hidden="true"></div>
  <div class="flex items-center justify-between">
    <h2 class="text-[17px] font-semibold">Share</h2>
    <form method="dialog">
      <button value="cancel" aria-label="Close"
              class="grid h-9 w-9 place-items-center rounded-full text-label-primary hover:bg-surface-secondary dark:text-label-primary-dark dark:hover:bg-surface-secondary-dark">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </form>
  </div>
  <ul class="mt-3 divide-y divide-separator/40">
    <li><button class="flex w-full items-center justify-between py-3 text-left">Copy link <span aria-hidden="true">→</span></button></li>
    <li><button class="flex w-full items-center justify-between py-3 text-left">Email <span aria-hidden="true">→</span></button></li>
    <li><button class="flex w-full items-center justify-between py-3 text-left">Export PDF <span aria-hidden="true">→</span></button></li>
  </ul>
</dialog>
