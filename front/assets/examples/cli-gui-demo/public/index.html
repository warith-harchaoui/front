<!doctype html>
<html lang="en" data-color-scheme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>imgconvert — front-skill CLI → GUI demo</title>
  <meta name="description" content="Demo GUI for the imgconvert mock CLI, built with the front skill: vanilla JS + Tailwind + Montserrat.">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Tailwind Play CDN keeps the demo zero-build. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['class', '[data-color-scheme="dark"]'],
      theme: {
        extend: {
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
            mono: ['ui-monospace', 'monospace'],
          },
          colors: {
            brand: {
              blue:      { DEFAULT: '#007AFF', dark: '#0A84FF', light: '#CCE4FF' },
              red:       { DEFAULT: '#FF3B30', dark: '#FF453A' },
              green:     { DEFAULT: '#28CD41', dark: '#30D158' },
            },
            label: {
              primary: '#000000', 'primary-dark': '#FFFFFF',
              secondary: 'rgba(60,60,67,0.6)', 'secondary-dark': 'rgba(235,235,245,0.6)',
              tertiary: 'rgba(60,60,67,0.3)', 'tertiary-dark': 'rgba(235,235,245,0.3)',
            },
            surface: {
              primary: '#FFFFFF', 'primary-dark': '#000000',
              secondary: '#F2F2F7', 'secondary-dark': '#1C1C1E',
              tertiary: '#FFFFFF', 'tertiary-dark': '#2C2C2E',
            },
            separator: 'rgba(60,60,67,0.36)',
          },
          backdropBlur: { ultra: '20px' },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/fonts/montserrat/fonts.css">
  <style>
    html { color-scheme: light dark; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body class="min-h-dvh bg-surface-primary text-label-primary antialiased dark:bg-surface-primary-dark dark:text-label-primary-dark">

  <a href="#main" class="sr-only focus:not-sr-only focus:fixed focus:left-3 focus:top-3 focus:z-50 focus:rounded-lg focus:bg-brand-blue focus:px-3 focus:py-2 focus:text-white">Skip to content</a>

  <header class="sticky top-0 z-30 border-b border-separator/40 bg-surface-primary/70 backdrop-blur-ultra dark:bg-surface-primary-dark/70">
    <div class="mx-auto flex w-full max-w-6xl items-center gap-3 px-4 py-3">
      <a href="/" class="flex items-center gap-2 font-semibold">
        <span class="grid h-7 w-7 place-items-center rounded-lg bg-brand-blue text-white" aria-hidden="true">i</span>
        <span>imgconvert</span>
      </a>
      <span class="text-[13px] text-label-secondary dark:text-label-secondary-dark">CLI → GUI demo</span>
      <button id="theme-btn" aria-label="Toggle theme" class="ml-auto grid h-11 w-11 place-items-center rounded-full hover:bg-surface-secondary dark:hover:bg-surface-secondary-dark">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="main" class="mx-auto grid w-full max-w-6xl grid-cols-12 gap-4 px-4 py-6">

    <!-- Sidebar (lg+) -->
    <aside class="col-span-12 lg:col-span-3">
      <nav aria-label="Subcommands">
        <ul class="flex gap-2 lg:flex-col" id="sidebar">
          <li>
            <button type="button" data-cmd="resize" aria-current="page"
                    class="flex w-full items-center gap-3 rounded-lg bg-surface-secondary px-3 py-2 text-left font-medium dark:bg-surface-secondary-dark">
              <span class="grid h-7 w-7 place-items-center rounded bg-brand-blue/15 text-brand-blue" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 3h7v7H3zM14 14h7v7h-7z"/></svg>
              </span>
              <span>resize</span>
            </button>
          </li>
          <li>
            <button type="button" data-cmd="convert"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left font-medium hover:bg-surface-secondary dark:hover:bg-surface-secondary-dark">
              <span class="grid h-7 w-7 place-items-center rounded bg-brand-green/15 text-brand-green" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
              </span>
              <span>convert</span>
            </button>
          </li>
          <li>
            <button type="button" data-cmd="optimize"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left font-medium hover:bg-surface-secondary dark:hover:bg-surface-secondary-dark">
              <span class="grid h-7 w-7 place-items-center rounded bg-brand-blue/15 text-brand-blue" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>
              </span>
              <span>optimize</span>
            </button>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main panel -->
    <section class="col-span-12 lg:col-span-9 space-y-4">

      <!-- Resize form -->
      <form id="form-resize" data-form="resize" class="rounded-2xl bg-surface-secondary p-5 dark:bg-surface-secondary-dark">
        <h2 class="text-[17px] font-semibold">resize — change pixel dimensions</h2>
        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <label class="block">
            <span class="text-[13px] font-medium">Input path</span>
            <input name="input" type="text" required value="demo/input.png"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 dark:bg-surface-primary-dark">
          </label>
          <label class="block">
            <span class="text-[13px] font-medium">Output path</span>
            <input name="output" type="text" required value="demo/output.png"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 dark:bg-surface-primary-dark">
          </label>
          <label class="block">
            <span class="text-[13px] font-medium">Width (px)</span>
            <input name="width" type="number" min="1" required value="800"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 tabular-nums dark:bg-surface-primary-dark">
          </label>
          <label class="block">
            <span class="text-[13px] font-medium">Height (px)</span>
            <input name="height" type="number" min="1" required value="600"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 tabular-nums dark:bg-surface-primary-dark">
          </label>
          <label class="flex items-center gap-3 sm:col-span-2">
            <input name="keep-aspect" type="checkbox" role="switch" class="peer sr-only" checked>
            <span aria-hidden="true" class="relative inline-block h-7 w-12 flex-none rounded-full bg-label-tertiary/40 transition-colors peer-checked:bg-brand-green motion-reduce:transition-none">
              <span class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-white shadow transition-transform peer-checked:translate-x-5 motion-reduce:transition-none"></span>
            </span>
            <span>Keep aspect ratio</span>
          </label>
        </div>
        <div class="mt-5 flex gap-2">
          <button type="submit" class="min-h-11 flex-1 rounded-full bg-brand-blue px-4 font-semibold text-white">Run</button>
          <button type="reset" class="min-h-11 rounded-full bg-surface-primary px-4 font-medium text-label-primary dark:bg-surface-primary-dark dark:text-label-primary-dark">Reset</button>
        </div>
      </form>

      <!-- Convert form -->
      <form id="form-convert" data-form="convert" class="hidden rounded-2xl bg-surface-secondary p-5 dark:bg-surface-secondary-dark">
        <h2 class="text-[17px] font-semibold">convert — change file format</h2>
        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <label class="block">
            <span class="text-[13px] font-medium">Input path</span>
            <input name="input" type="text" required value="demo/input.png"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 dark:bg-surface-primary-dark">
          </label>
          <label class="block">
            <span class="text-[13px] font-medium">Output path</span>
            <input name="output" type="text" required value="demo/output.webp"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 dark:bg-surface-primary-dark">
          </label>
          <fieldset class="sm:col-span-2">
            <legend class="text-[13px] font-medium">Target format</legend>
            <div role="radiogroup" aria-label="Target format" class="mt-1 inline-flex w-full max-w-md rounded-full bg-surface-primary p-1 dark:bg-surface-primary-dark">
              <label class="flex-1"><input type="radio" name="to" value="png" class="peer sr-only"><span class="block cursor-pointer rounded-full px-3 py-1.5 text-center text-[15px] font-medium peer-checked:bg-brand-blue peer-checked:text-white">PNG</span></label>
              <label class="flex-1"><input type="radio" name="to" value="jpg" class="peer sr-only"><span class="block cursor-pointer rounded-full px-3 py-1.5 text-center text-[15px] font-medium peer-checked:bg-brand-blue peer-checked:text-white">JPG</span></label>
              <label class="flex-1"><input type="radio" name="to" value="webp" class="peer sr-only" checked><span class="block cursor-pointer rounded-full px-3 py-1.5 text-center text-[15px] font-medium peer-checked:bg-brand-blue peer-checked:text-white">WebP</span></label>
            </div>
          </fieldset>
          <label class="block sm:col-span-2">
            <span class="text-[13px] font-medium">Quality <output for="quality" id="quality-out" class="ml-1 tabular-nums">85</output></span>
            <input name="quality" id="quality" type="range" min="1" max="100" value="85" class="mt-2 w-full accent-brand-blue">
          </label>
        </div>
        <div class="mt-5 flex gap-2">
          <button type="submit" class="min-h-11 flex-1 rounded-full bg-brand-blue px-4 font-semibold text-white">Run</button>
          <button type="reset" class="min-h-11 rounded-full bg-surface-primary px-4 font-medium dark:bg-surface-primary-dark">Reset</button>
        </div>
      </form>

      <!-- Optimize form -->
      <form id="form-optimize" data-form="optimize" class="hidden rounded-2xl bg-surface-secondary p-5 dark:bg-surface-secondary-dark">
        <h2 class="text-[17px] font-semibold">optimize — shrink to target size</h2>
        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <label class="block sm:col-span-2">
            <span class="text-[13px] font-medium">Input path</span>
            <input name="input" type="text" required value="demo/input.png"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 dark:bg-surface-primary-dark">
          </label>
          <label class="block">
            <span class="text-[13px] font-medium">Max size (KB)</span>
            <input name="max-kb" type="number" min="1" required value="200"
                   class="mt-1 w-full rounded-xl border border-separator bg-surface-primary px-3 py-2 tabular-nums dark:bg-surface-primary-dark">
          </label>
          <label class="flex items-center gap-3">
            <input name="in-place" type="checkbox" role="switch" class="peer sr-only">
            <span aria-hidden="true" class="relative inline-block h-7 w-12 flex-none rounded-full bg-label-tertiary/40 transition-colors peer-checked:bg-brand-green motion-reduce:transition-none">
              <span class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-white shadow transition-transform peer-checked:translate-x-5 motion-reduce:transition-none"></span>
            </span>
            <span>Overwrite in place</span>
          </label>
          <label class="flex items-center gap-3 sm:col-span-2">
            <input name="strip-metadata" type="checkbox" role="switch" class="peer sr-only" checked>
            <span aria-hidden="true" class="relative inline-block h-7 w-12 flex-none rounded-full bg-label-tertiary/40 transition-colors peer-checked:bg-brand-green motion-reduce:transition-none">
              <span class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-white shadow transition-transform peer-checked:translate-x-5 motion-reduce:transition-none"></span>
            </span>
            <span>Strip metadata</span>
          </label>
        </div>
        <div class="mt-5 flex gap-2">
          <button type="submit" class="min-h-11 flex-1 rounded-full bg-brand-blue px-4 font-semibold text-white">Run</button>
          <button type="reset" class="min-h-11 rounded-full bg-surface-primary px-4 font-medium dark:bg-surface-primary-dark">Reset</button>
        </div>
      </form>

      <!-- Log + error panels -->
      <div id="error" role="alert" class="hidden rounded-2xl bg-brand-red/10 p-4 text-brand-red"></div>

      <section aria-label="Output log" class="rounded-2xl bg-surface-secondary p-4 dark:bg-surface-secondary-dark">
        <div class="flex items-center justify-between">
          <h2 class="text-[15px] font-semibold">Log</h2>
          <span id="status" class="text-[13px] text-label-secondary dark:text-label-secondary-dark" role="status" aria-live="polite">Idle</span>
        </div>
        <pre id="log" class="mt-2 max-h-72 min-h-24 overflow-y-auto rounded-xl bg-surface-primary p-3 font-mono text-[13px] leading-relaxed dark:bg-surface-primary-dark"></pre>
      </section>

    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
